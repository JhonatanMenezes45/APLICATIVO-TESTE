<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a3a1a" />
  <title>Contador de Coco Verde</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-deep: #0d2b0d;
      --green-mid: #1a4a1a;
      --green-bright: #2d8a2d;
      --green-neon: #4dff6e;
      --yellow-coco: #c8e64a;
      --white: #f0f5e8;
      --gray: #8aab8a;
      --accent: #ff6b35;
    }

    html, body {
      height: 100%;
      background: var(--green-deep);
      color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
      touch-action: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
    }

    /* === HEADER === */
    #header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      background: linear-gradient(to bottom, rgba(13,43,13,0.95) 60%, transparent);
    }

    #title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--yellow-coco);
      text-shadow: 0 0 12px rgba(200,230,74,0.4);
    }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--gray);
      transition: background 0.3s, box-shadow 0.3s;
    }
    #status-dot.active {
      background: var(--green-neon);
      box-shadow: 0 0 8px var(--green-neon);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* === CAMERA === */
    #camera-wrap {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* scanline overlay */
    #camera-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 3;
    }

    /* corner brackets */
    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--yellow-coco);
      border-style: solid;
      opacity: 0.8;
      z-index: 4;
    }
    .corner.tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }

    /* === BIG COUNTER === */
    #counter-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      text-align: center;
      pointer-events: none;
    }

    #big-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 28vw, 140px);
      line-height: 1;
      color: var(--yellow-coco);
      text-shadow:
        0 0 20px rgba(200,230,74,0.7),
        0 0 60px rgba(200,230,74,0.3),
        2px 2px 0 rgba(0,0,0,0.5);
      transition: transform 0.1s;
    }

    #big-count.bump {
      transform: scale(1.15);
    }

    #count-label {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--green-neon);
      text-transform: uppercase;
      opacity: 0.85;
      margin-top: -6px;
    }

    /* === BOTTOM BAR === */
    #bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 14px 18px 28px;
      background: linear-gradient(to top, rgba(13,43,13,0.97) 60%, transparent);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #stats-row {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-line {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--gray);
    }
    .stat-line span:last-child {
      color: var(--white);
      font-weight: 600;
    }

    #confidence-bar-wrap {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    #confidence-bar {
      height: 100%;
      background: var(--green-neon);
      width: 0%;
      transition: width 0.3s;
      border-radius: 2px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 10px 14px;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .btn:active { transform: scale(0.94); }

    #btn-reset {
      background: rgba(255,107,53,0.15);
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    #btn-reset:active { background: rgba(255,107,53,0.3); }

    #btn-manual {
      background: var(--yellow-coco);
      color: var(--green-deep);
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 20px;
    }
    #btn-manual:active { background: #a8c030; }

    /* === LOADING SCREEN === */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 100;
      background: var(--green-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px;
    }

    #loading-icon {
      font-size: 64px;
      animation: bob 2s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    #loading-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--yellow-coco);
      letter-spacing: 3px;
      text-align: center;
    }

    #loading-msg {
      font-size: 12px;
      color: var(--gray);
      text-align: center;
      line-height: 1.8;
    }

    #progress-wrap {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--yellow-coco);
      width: 0%;
      transition: width 0.5s;
      border-radius: 4px;
    }

    #btn-start {
      background: var(--yellow-coco);
      color: var(--green-deep);
      font-size: 14px;
      letter-spacing: 2px;
      padding: 16px 32px;
      border-radius: 16px;
      display: none;
    }

    /* === NOTIFICATIONS === */
    #notif {
      position: absolute;
      top: 70px;
      left: 50%; transform: translateX(-50%);
      z-index: 20;
      background: rgba(77,255,110,0.15);
      border: 1px solid var(--green-neon);
      color: var(--green-neon);
      font-size: 11px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    #notif.show { opacity: 1; }

    /* detection boxes */
    .det-box {
      position: absolute;
      border: 2px solid var(--yellow-coco);
      border-radius: 6px;
      pointer-events: none;
      box-shadow: 0 0 8px rgba(200,230,74,0.4);
    }
    .det-label {
      position: absolute;
      top: -20px; left: 0;
      background: var(--yellow-coco);
      color: var(--green-deep);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }

    #mode-badge {
      position: absolute;
      top: 60px; right: 14px;
      z-index: 9;
      background: rgba(13,43,13,0.85);
      border: 1px solid var(--green-bright);
      color: var(--green-neon);
      font-size: 9px;
      letter-spacing: 1.5px;
      padding: 4px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- LOADING -->
  <div id="loading">
    <div id="loading-icon">🥥</div>
    <div id="loading-title">Contador de<br>Coco Verde</div>
    <div id="loading-msg" id="loading-msg">Carregando inteligência artificial...<br>Isso pode levar alguns segundos.</div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <button class="btn" id="btn-start" onclick="startCamera()">▶ Iniciar Câmera</button>
  </div>

  <!-- HEADER -->
  <div id="header">
    <div id="title">🥥 CocoCount</div>
    <div id="status-dot"></div>
  </div>

  <div id="mode-badge" id="mode-badge">IA Ativa</div>
  <div id="notif">Detectado!</div>

  <!-- CAMERA -->
  <div id="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Big counter -->
    <div id="counter-overlay">
      <div id="big-count">0</div>
      <div id="count-label">cocos detectados</div>
    </div>
  </div>

  <!-- BOTTOM -->
  <div id="bottom-bar">
    <div id="stats-row">
      <div class="stat-line">
        <span>Sessão</span>
        <span id="session-count">0 cocos</span>
      </div>
      <div class="stat-line">
        <span>Confiança IA</span>
        <span id="confidence-val">–</span>
      </div>
      <div id="confidence-bar-wrap">
        <div id="confidence-bar"></div>
      </div>
      <div class="stat-line" style="margin-top:4px">
        <span>FPS</span>
        <span id="fps-val">–</span>
      </div>
    </div>
    <button class="btn" id="btn-reset" onclick="resetCount()">Reset</button>
    <button class="btn" id="btn-manual" onclick="manualAdd()" title="Adicionar manualmente">+1</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<script>
  let model = null;
  let count = 0;
  let sessionTotal = 0;
  let isRunning = false;
  let lastFpsTime = Date.now();
  let frameCount = 0;
  let detectionActive = false;
  let notifTimer = null;

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const bigCount = document.getElementById('big-count');
  const sessionCountEl = document.getElementById('session-count');
  const confidenceVal = document.getElementById('confidence-val');
  const confidenceBar = document.getElementById('confidence-bar');
  const fpsVal = document.getElementById('fps-val');
  const statusDot = document.getElementById('status-dot');
  const loadingEl = document.getElementById('loading');
  const loadingMsg = document.getElementById('loading-msg');
  const progressBar = document.getElementById('progress-bar');
  const btnStart = document.getElementById('btn-start');
  const notif = document.getElementById('notif');
  const modeBadge = document.getElementById('mode-badge');

  // Load model
  async function loadModel() {
    try {
      progressBar.style.width = '20%';
      loadingMsg.textContent = 'Baixando modelo de visão computacional...';
      
      // Try to load COCO-SSD (detects many objects including fruits)
      model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
      
      progressBar.style.width = '100%';
      loadingMsg.innerHTML = '✅ Modelo carregado!<br>Toque para iniciar a câmera.';
      btnStart.style.display = 'block';
    } catch (e) {
      loadingMsg.innerHTML = '⚠️ Sem internet para baixar o modelo.<br>Use o modo manual (+1) ou conecte uma vez para baixar a IA.';
      btnStart.style.display = 'block';
      btnStart.textContent = '▶ Modo Manual';
      modeBadge.textContent = 'Modo Manual';
      modeBadge.style.color = '#ff6b35';
      modeBadge.style.borderColor = '#ff6b35';
    }
  }

  async function startCamera() {
    btnStart.style.display = 'none';
    loadingMsg.textContent = 'Acessando câmera...';
    progressBar.style.width = '60%';

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });

      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        loadingEl.style.display = 'none';
        isRunning = true;
        statusDot.classList.add('active');
        if (model) {
          requestAnimationFrame(detect);
        }
      };
    } catch (e) {
      loadingMsg.innerHTML = '❌ Câmera não disponível.<br>Verifique as permissões do navegador.';
      btnStart.style.display = 'block';
      btnStart.textContent = '🔄 Tentar novamente';
    }
  }

  // ---- Detection targets: objects that look like coconuts ----
  // COCO-SSD doesn't have "coconut" but detects: sports ball, orange, apple
  // We'll also look for any round green object heuristically
  const COCO_TARGETS = ['sports ball', 'orange', 'apple', 'frisbee'];
  const CONFIDENCE_THRESHOLD = 0.35;

  // Heuristic green-circle detector using canvas pixel analysis
  function analyzeFrameForGreenCircles(imageData, width, height) {
    const data = imageData.data;
    let greenPixels = 0;
    let totalPixels = 0;
    
    // Sample every 8th pixel for performance
    for (let i = 0; i < data.length; i += 32) {
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];
      
      // Is it green-ish? (coconut verde color range)
      const isGreen = g > 80 && g > r * 1.3 && g > b * 1.2 && r < 200 && b < 180;
      if (isGreen) greenPixels++;
      totalPixels++;
    }
    
    return greenPixels / totalPixels;
  }

  // Cluster green blobs into coconut regions
  function findGreenBlobs(imageData, width, height) {
    // Simplified: scan in a grid and find green clusters
    const blockSize = 20;
    const cols = Math.floor(width / blockSize);
    const rows = Math.floor(height / blockSize);
    const grid = [];
    
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        let green = 0, total = 0;
        for (let dy = 0; dy < blockSize; dy++) {
          for (let dx = 0; dx < blockSize; dx++) {
            const px = (row * blockSize + dy) * width + (col * blockSize + dx);
            const i = px * 4;
            if (i + 2 >= imageData.data.length) continue;
            const r = imageData.data[i];
            const g = imageData.data[i + 1];
            const b = imageData.data[i + 2];
            const isGreen = g > 75 && g > r * 1.25 && g > b * 1.15 && r < 210;
            if (isGreen) green++;
            total++;
          }
        }
        grid.push({ row, col, ratio: total > 0 ? green / total : 0 });
      }
    }
    
    // BFS to find connected green regions
    const visited = new Set();
    const blobs = [];
    
    const getKey = (r, c) => `${r},${c}`;
    const isGreenBlock = (r, c) => {
      const item = grid.find(g => g.row === r && g.col === c);
      return item && item.ratio > 0.35;
    };
    
    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const key = getKey(row, col);
        if (visited.has(key) || !isGreenBlock(row, col)) continue;
        
        // BFS
        const queue = [[row, col]];
        const blobCells = [];
        visited.add(key);
        
        while (queue.length > 0) {
          const [r, c] = queue.shift();
          blobCells.push([r, c]);
          
          for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
            const nr = r + dr, nc = c + dc;
            const nk = getKey(nr, nc);
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited.has(nk) && isGreenBlock(nr, nc)) {
              visited.add(nk);
              queue.push([nr, nc]);
            }
          }
        }
        
        // Filter small blobs (< 4 blocks = too small)
        if (blobCells.length >= 4) {
          const minR = Math.min(...blobCells.map(c => c[0]));
          const maxR = Math.max(...blobCells.map(c => c[0]));
          const minC = Math.min(...blobCells.map(c => c[1]));
          const maxC = Math.max(...blobCells.map(c => c[1]));
          
          blobs.push({
            x: minC * blockSize,
            y: minR * blockSize,
            w: (maxC - minC + 1) * blockSize,
            h: (maxR - minR + 1) * blockSize,
            cells: blobCells.length
          });
        }
      }
    }
    
    return blobs;
  }

  let prevBlobCount = 0;
  let stableFrames = 0;
  const STABLE_FRAMES_NEEDED = 8;
  let lastNotifiedCount = -1;

  async function detect() {
    if (!isRunning) return;

    // FPS
    frameCount++;
    const now = Date.now();
    if (now - lastFpsTime >= 1000) {
      fpsVal.textContent = frameCount + ' fps';
      frameCount = 0;
      lastFpsTime = now;
    }

    // Resize canvas to video
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let cocosThisFrame = 0;
    let maxConf = 0;

    // Method 1: COCO-SSD model
    if (model) {
      try {
        const predictions = await model.detect(video);
        const cocos = predictions.filter(p =>
          COCO_TARGETS.includes(p.class) && p.score >= CONFIDENCE_THRESHOLD
        );

        cocosThisFrame = cocos.length;
        
        for (const pred of cocos) {
          if (pred.score > maxConf) maxConf = pred.score;
          const [x, y, w, h] = pred.bbox;
          const scaleX = canvas.width / (video.videoWidth || 640);
          const scaleY = canvas.height / (video.videoHeight || 480);
          
          ctx.strokeStyle = '#c8e64a';
          ctx.lineWidth = 2;
          ctx.shadowColor = '#c8e64a';
          ctx.shadowBlur = 8;
          ctx.strokeRect(x * scaleX, y * scaleY, w * scaleX, h * scaleY);
          ctx.shadowBlur = 0;
          
          ctx.fillStyle = '#c8e64a';
          ctx.font = '700 11px IBM Plex Mono';
          ctx.fillText(`🥥 ${Math.round(pred.score * 100)}%`, x * scaleX + 4, y * scaleY - 6);
        }
      } catch(e) {}
    }

    // Method 2: Heuristic green blob detection (always runs)
    try {
      const offscreen = document.createElement('canvas');
      offscreen.width = Math.floor((video.videoWidth || 640) / 4);
      offscreen.height = Math.floor((video.videoHeight || 480) / 4);
      const offCtx = offscreen.getContext('2d');
      offCtx.drawImage(video, 0, 0, offscreen.width, offscreen.height);
      const imageData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
      
      const blobs = findGreenBlobs(imageData, offscreen.width, offscreen.height);
      
      if (blobs.length > cocosThisFrame) {
        cocosThisFrame = blobs.length;
        
        // Draw blob boxes
        const scaleX = canvas.width / offscreen.width;
        const scaleY = canvas.height / offscreen.height;
        
        for (const blob of blobs) {
          ctx.strokeStyle = '#4dff6e';
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]);
          ctx.shadowColor = '#4dff6e';
          ctx.shadowBlur = 6;
          ctx.strokeRect(blob.x * scaleX, blob.y * scaleY, blob.w * scaleX, blob.h * scaleY);
          ctx.setLineDash([]);
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#4dff6e';
          ctx.font = '600 10px IBM Plex Mono';
          ctx.fillText(`🥥 verde`, blob.x * scaleX + 4, blob.y * scaleY - 5);
        }
        
        if (!model) maxConf = 0.65; // heuristic estimate
      }
    } catch(e) {}

    // Stability: require count to be stable for N frames
    if (cocosThisFrame === prevBlobCount) {
      stableFrames++;
    } else {
      stableFrames = 0;
      prevBlobCount = cocosThisFrame;
    }

    // Update live count display
    updateDisplay(cocosThisFrame, maxConf);

    requestAnimationFrame(detect);
  }

  function updateDisplay(detected, conf) {
    // Update big number
    if (bigCount.textContent !== String(detected)) {
      bigCount.textContent = detected;
      bigCount.classList.remove('bump');
      void bigCount.offsetWidth;
      bigCount.classList.add('bump');
      setTimeout(() => bigCount.classList.remove('bump'), 150);
    }

    // Confidence
    if (conf > 0) {
      const pct = Math.round(conf * 100);
      confidenceVal.textContent = pct + '%';
      confidenceBar.style.width = pct + '%';
    } else if (detected > 0) {
      confidenceVal.textContent = 'blob';
      confidenceBar.style.width = '65%';
    } else {
      confidenceVal.textContent = '–';
      confidenceBar.style.width = '0%';
    }

    // Session total (only count when stable)
    if (stableFrames === STABLE_FRAMES_NEEDED && detected > 0 && detected !== lastNotifiedCount) {
      if (detected > lastNotifiedCount && lastNotifiedCount >= 0) {
        // New coconuts appeared
        const diff = detected - lastNotifiedCount;
        sessionTotal += diff;
        sessionCountEl.textContent = sessionTotal + ' cocos';
        showNotif(`+${diff} coco${diff > 1 ? 's' : ''} detectado${diff > 1 ? 's' : ''}!`);
      }
      lastNotifiedCount = detected;
    }

    if (detected === 0) lastNotifiedCount = 0;
  }

  function showNotif(msg) {
    notif.textContent = msg;
    notif.classList.add('show');
    clearTimeout(notifTimer);
    notifTimer = setTimeout(() => notif.classList.remove('show'), 2000);
  }

  function manualAdd() {
    count++;
    sessionTotal++;
    sessionCountEl.textContent = sessionTotal + ' cocos';
    bigCount.textContent = parseInt(bigCount.textContent) + 1;
    bigCount.classList.remove('bump');
    void bigCount.offsetWidth;
    bigCount.classList.add('bump');
    setTimeout(() => bigCount.classList.remove('bump'), 150);
    showNotif('+1 adicionado manualmente');
  }

  function resetCount() {
    if (!confirm('Resetar a contagem?')) return;
    count = 0;
    sessionTotal = 0;
    lastNotifiedCount = -1;
    sessionCountEl.textContent = '0 cocos';
    bigCount.textContent = '0';
    showNotif('Contagem resetada');
  }

  // Init
  loadModel();
</script>
</body>
</html>
